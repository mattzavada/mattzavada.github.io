<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="./css/style.css">
  
  <title>Frontend Mentor | Product preview card component</title>


</head>
<body>
  <article class="container">
      <picture class="image">
        <source media="(max-width: 375px)" srcset="./images/image-product-mobile.jpg">
        <source media="(min-width: 376px)" srcset="./images/image-product-desktop.jpg">
        <img src="./images/image-product-mobile.jpg" alt="Chris standing up holding his daughter Elva">
      </picture>
    
    <section class="productDetails">
      <div class="productCategory">Perfume</div>
        
      <div class="productName">Gabrielle Essence Eau De Parfum</div>
        
      <div class="productDesc">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</div>
      <div class="prices">
        <div class="salePrice">$149.99</div>
        <div class="originalPrice">$169.99</div>
      </div>  
      <button class="button">
        <img src="./images/icon-cart.svg" alt="Cart" class="buttonImage">
          Add to Cart
      </button>
    </section>
  </article>
  
  <footer class="attribution">
    
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://mattzavada.github.io/" target="_blank">Matthew Zavada</a>.
    
  </footer>
</body>
</html>
