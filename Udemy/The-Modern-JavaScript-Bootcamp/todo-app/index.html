<!DOCTYPE html>
<html>
  <head> </head>
  <body>
    <h1>Todo App</h1>
    <h2 id="left-to-complete"></h2>
    <input id="search-query" type="text" placeholder="Type to search" />
    <label>
      <input type="checkbox" name="hideCompleted" id="hide-completed" checked />
      Hide Completed
    </label>
    <div id="todos"></div>

    <form id="create-todo-form">
      <input
        type="text"
        id="new-todo-text"
        placeholder="Enter new todo"
        name="todoText" />
      <button id="save-todo" type="submit">Save todo</button>
    </form>

    <script src="todo-app.js"></script>
  </body>
</html>
